<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backlog Opener Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Backlog設定</h1>
        <p class="description">
          1行に1件ずつ、<strong>ラベル名,ドメイン名,プロジェクト名</strong> の形式で登録してください。<br />
          例: <code>ISID WinC,isidwinc.backlog.jp,ProjectName</code>
        </p>
        <form id="domains-form" class="stack">
          <label for="domains">Backlog設定一覧</label>
          <textarea id="domains" name="domains" rows="8" placeholder="開発A,team-a.backlog.jp,ProjectA&#10;開発B,team-b.backlog.com,ProjectB"></textarea>
          <button type="submit">保存する</button>
        </form>
        <p id="save-message" class="message" aria-live="polite"></p>
      </section>
    </main>
    <script src="storage.js"></script>
    <script src="options.js"></script>
  </body>
</html>
