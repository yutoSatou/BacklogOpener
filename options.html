<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Backlog Opener Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Backlogドメイン設定</h1>
        <p class="description">1行に1つずつ、Backlogのドメインを登録してください。<br />例: <code>example.backlog.jp</code> または <code>https://example.backlog.com</code></p>
        <form id="domains-form" class="stack">
          <label for="domains">Backlogドメイン一覧</label>
          <textarea id="domains" name="domains" rows="8" placeholder="team-a.backlog.jp&#10;team-b.backlog.com"></textarea>
          <button type="submit">保存する</button>
        </form>
        <p id="save-message" class="message" aria-live="polite"></p>
      </section>
    </main>
    <script src="storage.js"></script>
    <script src="options.js"></script>
  </body>
</html>
